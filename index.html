<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href = "styles.css">
    <script src = "javascript.js" defer></script>
</head>
<body>

    <div class = "calContainer">
        <div id = "display">123</div>
    
        <div class = "buttonContainer">
            <button class = "clear backgroundPurple">AC</button>
            <button class = "backspace backgroundPurple">⌫</button>
            <button class = "divide backgroundPurple" id = "divideDesign">/</button>
            <div class="midCalc">
                <button class = "one">1</button>
                <button class = "two">2</button>
                <button class="three">3</button>
                 <button class="plus backgroundPurple">+</button>
                <button class = "four">4</button>
                <button class = "five">5</button>
                <button class = "six">6</button>
                <button class = "subtract backgroundPurple">-</button>
                <button class = "seven">7</button>
                <button class = "eight">8</button>
                <button class = "nine">9</button>
                <button class = "multiply backgroundPurple">x</button>
            </div>
            <button class = "dot">.</button>
            <button class = "zero">0</button>
            <button class = "equal" id = "equalDesign">=</button>
        </div>
    </div>
    



</body>
</html>
